name: Integration Test
hosts: tack-integration-test
connection: docker

roles:
  - testrole

tasks:
  # ============================================
  # Command module tests
  # ============================================
  - name: Run simple echo command
    command:
      cmd: echo "hello from tack"

  - name: Create marker file via command
    command:
      cmd: echo "command-created" > /tmp/command-marker.txt

  # ============================================
  # File module tests
  # ============================================
  - name: Create test directory
    file:
      path: /tmp/tack-test-dir
      state: directory
      mode: "0755"

  - name: Create nested directories
    file:
      path: /tmp/tack-test-dir/nested/deep
      state: directory
      mode: "0700"

  - name: Create empty file with touch
    file:
      path: /tmp/tack-test-dir/touched.txt
      state: touch
      mode: "0644"

  - name: Create file for symlink target
    copy:
      dest: /tmp/tack-test-dir/link-target.txt
      content: "symlink target content"

  - name: Create symlink
    file:
      path: /tmp/tack-test-dir/test-link
      src: /tmp/tack-test-dir/link-target.txt
      state: link

  # ============================================
  # Copy module tests
  # ============================================
  - name: Copy content to file
    copy:
      dest: /tmp/tack-test-dir/copied.txt
      content: |
        This file was created by tack copy module.
        Line 2 of the file.
      mode: "0640"

  - name: Copy file with specific permissions
    copy:
      dest: /tmp/tack-test-dir/executable.sh
      content: |
        #!/bin/bash
        echo "I am executable"
      mode: "0755"

  - name: Create config file
    copy:
      dest: /tmp/tack-test-dir/config.yaml
      content: |
        server:
          port: 8080
          host: localhost
        logging:
          level: info
