# Sample inventory file
#
# Run with: tack run playbook.yaml -i examples/inventory.yaml --hosts webservers

hosts:
  web1:
    ssh:
      user: deploy
      port: 22
      key: ~/.ssh/id_deploy
    vars:
      region: us-east-1
      datacenter: nyc

  web2:
    ssh:
      user: deploy
    vars:
      region: us-west-2
      datacenter: sfo

  db1:
    ssh:
      user: postgres
      host_key_checking: false
    vars:
      role: database

  # SSM-managed instance (no SSH config needed)
  i-0abc1234567890001:
    vars:
      env: production
      app: api

groups:
  # SSH group — playbook can reference "webservers" in hosts:
  webservers:
    hosts: [web1, web2]
    ssh:
      user: deploy          # group-level default (overridden by per-host ssh config)
    vars:
      app_port: 8080
      nginx_worker_processes: auto

  databases:
    hosts: [db1]
    vars:
      backup_enabled: true

  # SSM group — explicit instance IDs under ssm.instances
  prod-app:
    connection: ssm
    ssm:
      region: us-east-1
      bucket: my-ssm-transfer-bucket
      instances:
        - i-0abc1234567890001
        - i-0def5678901234567
    vars:
      env: production
      app: api

  # SSM group — instance IDs under hosts: (both styles are equivalent)
  prod-db:
    connection: ssm
    ssm:
      region: us-east-1
      bucket: my-ssm-transfer-bucket
    hosts:
      - i-0aaa111122223333a
    vars:
      env: production
      app: db

  # SSM group — tag-based discovery (instances resolved at runtime)
  prod-workers:
    connection: ssm
    ssm:
      region: us-east-1
      tags:
        env: production
        role: worker
    vars:
      env: production
