---
# Example: deploy application code from a git repository to /opt/app.
# Idempotent: re-running does nothing when the repo is already at the
# desired SHA.
- name: Deploy application from git
  hosts: app-servers
  connection: ssh
  gather_facts: false
  vars:
    app_repo: git@github.com:acme/app.git
    app_dest: /opt/app
    app_version: main

  tasks:
    - name: Check out application code
      git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dest }}"
        version: "{{ app_version }}"
        depth: 1
        single_branch: true
      register: app_repo_result

    - name: Record deployed revision
      when: "app_repo_result.changed"
      copy:
        dest: /opt/app/REVISION
        content: "{{ app_repo_result.after_sha }}\n"
        mode: "0644"

    - name: Report no-change
      when: "app_repo_result.changed == false"
      command:
        cmd: "echo already at {{ app_repo_result.after_sha }}"
