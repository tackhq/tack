name: Test Docker Container
hosts: tack-test
connection: docker

tasks:
  - name: Say hello
    command:
      cmd: echo "Hello from Tack inside Docker!"

  - name: Show OS info
    command:
      cmd: cat /etc/os-release

  - name: Create a file
    copy:
      dest: /tmp/tack-was-here.txt
      content: |
        Tack successfully configured this container!
        Timestamp: {{ env.USER }}@localhost

  - name: List created file
    command:
      cmd: cat /tmp/tack-was-here.txt
